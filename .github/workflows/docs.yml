name: Docs CI/CD

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LINK_MODE: copy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Verify and install vendored Siemens docs theme
        run: |
          test -d ./vendor/docs-theme/mkdocs_siemens/templates
          test -f ./vendor/docs-theme/mkdocs_siemens/__init__.py
          uv pip install --python .venv/bin/python --no-deps ./vendor/docs-theme

      - name: Build docs (strict)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            uv run mkdocs build --strict --no-directory-urls
          else
            uv run mkdocs build --strict
          fi

      - name: Upload build artifact (debug/review)
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site/
          retention-days: 1

      - name: Prepare Pages artifact
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
